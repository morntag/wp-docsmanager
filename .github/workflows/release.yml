# Runs tests/linting as a gate, then creates a release using release-it.
# Triggers on push to main and manual workflow_dispatch for dry-runs.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (no actual release)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  test:
    # Skip release-it's own bump commit and [skip ci] markers.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (!contains(github.event.head_commit.message, 'chore(release):') &&
       !contains(github.event.head_commit.message, '[skip ci]') &&
       github.event.head_commit.message != 'Initial commit')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install Composer dependencies
        run: composer install

      - name: Run PHPCS
        run: composer phpcs

      - name: Run PHPStan
        run: composer phpstan

      - name: Run PHPUnit
        run: composer test

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Run release-it
        id: release-it
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm run release:dry -- --ci
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")

          if npm run release -- --ci; then
            AFTER_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
            if [ "$BEFORE_TAG" = "$AFTER_TAG" ]; then
              echo "No new tag was created - nothing to release."
              echo "released=false" >> "$GITHUB_OUTPUT"
            else
              echo "Released $BEFORE_TAG -> $AFTER_TAG"
              echo "released=true" >> "$GITHUB_OUTPUT"
              echo "tag=$AFTER_TAG" >> "$GITHUB_OUTPUT"
            fi
          else
            STATUS=$?
            # release-it exits non-zero when there are no releasable commits.
            # Detect by checking whether the tag changed; if not, treat as a
            # clean no-op so pushes of only chore:/docs:/wip: don't fail CI.
            AFTER_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
            if [ "$BEFORE_TAG" = "$AFTER_TAG" ]; then
              echo "release-it exited $STATUS but no new tag - treating as no-op."
              echo "released=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "release-it failed with status $STATUS after creating tag $AFTER_TAG"
            exit $STATUS
          fi

      - name: Package release ZIP
        if: steps.release-it.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Pull the freshly-bumped version directly from the plugin header so
          # the ZIP filename always matches the tag release-it just created.
          VERSION=$(grep -E '^\s*\*\s*Version:' wp-docsmanager.php | head -1 | sed -E 's/.*Version:\s*//' | tr -d '[:space:]')
          echo "Packaging wp-docsmanager v${VERSION}"

          # Production-only vendor/ so the ZIP does not ship dev tooling.
          composer install --no-dev --optimize-autoloader

          # Inline exclude list. Kept here (not in a committed .zipexclude file)
          # because past runs picked up a stale on-disk file and shipped bloat.
          # Patterns without a leading slash match at any depth (rsync default),
          # so vendor/**/test matches nested test dirs in every package.
          cat > .release-excludes <<'EOF'
          # Repo tooling
          .git
          .github
          .gitignore
          .zipexclude
          .release-excludes
          .claude
          .env
          .phpunit.cache
          node_modules
          tests
          plans
          phpunit.xml
          phpcs.xml
          phpstan.neon
          phpstan-bootstrap.php
          biome.json
          package.json
          package-lock.json
          composer.json
          composer.lock
          lefthook.yml
          commitlint.config.js
          .release-it.json
          CHANGELOG.md
          CLAUDE.md
          implement-learnings.md
          assets/src

          # Vendor bloat (dev/test fixtures, duplicate docs, unused CLI shims)
          vendor/bin
          vendor/**/test
          vendor/**/tests
          vendor/**/*.md
          vendor/**/*.dist
          vendor/**/.travis.yml
          vendor/**/.gitattributes
          vendor/**/.gitignore
          vendor/**/composer.json
          vendor/yahnis-elsts/plugin-update-checker/vendor
          vendor/yahnis-elsts/plugin-update-checker/languages
          EOF

          # Stage into a sibling dir named wp-docsmanager/ so the ZIP has a
          # single top-level folder matching the plugin slug.
          STAGING_PARENT=$(mktemp -d)
          STAGING="${STAGING_PARENT}/wp-docsmanager"
          mkdir -p "$STAGING"
          rsync -a --exclude-from=.release-excludes ./ "$STAGING/"

          # Build the ZIP in the repo root.
          ZIP="wp-docsmanager-v${VERSION}.zip"
          (cd "$STAGING_PARENT" && zip -r "${GITHUB_WORKSPACE}/${ZIP}" wp-docsmanager)

          echo "ZIP contents (first 40 entries):"
          unzip -l "$ZIP" | head -40
          echo "ZIP size: $(du -h "$ZIP" | cut -f1)"

          # Attach to the GitHub release release-it just created.
          gh release upload "v${VERSION}" "$ZIP" --clobber
